services:
  lightrag:
    volumes:
      - ./lightrag/operate.py:/app/lightrag/operate.py
      - ./lightrag/api/config.py:/app/lightrag/api/config.py
      - ./lightrag/api/lightrag_server.py:/app/lightrag/api/lightrag_server.py
      - ./lightrag/api/routers/query_routes_runtime.py:/app/lightrag/api/routers/query_routes.py

  model-api:
    build:
      context: ./model_service
      dockerfile: Dockerfile.cpu
    ports:
      - "8001:8001"
    volumes:
      - ./data/hf-cache:/models/hf-cache
    environment:
      HF_HOME: /models/hf-cache
      SENTENCE_TRANSFORMERS_HOME: /models/hf-cache/sentence-transformers
      TRANSFORMERS_CACHE: /models/hf-cache/transformers
      HF_HUB_DISABLE_XET: "1"
      MODEL_DEVICE: cpu
      EMBEDDING_MODEL: Qwen/Qwen3-Embedding-0.6B
      RERANK_MODEL: BAAI/bge-reranker-v2-m3
      EMBED_BATCH_SIZE: "4"
      RERANK_BATCH_SIZE: "4"
      MODEL_MAX_LENGTH: "8192"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s
